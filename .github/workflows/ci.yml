name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm verify

      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

  gen-types-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1

      - name: 关联项目并生成最新类型,与提交版本比对
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase gen types typescript --linked > /tmp/database.types.ts

          # 去掉尾随空白后比对,避免跨平台换行差异
          sed 's/[[:space:]]*$//' src/types/database.types.ts > /tmp/committed.clean
          sed 's/[[:space:]]*$//' /tmp/database.types.ts > /tmp/remote.clean

          if ! diff -q /tmp/committed.clean /tmp/remote.clean; then
            echo "::error::database.types.ts 与 Supabase schema 不一致"
            echo "请本地运行: pnpm gen-types"
            echo ""
            echo "--- 差异(committed vs remote) ---"
            diff /tmp/committed.clean /tmp/remote.clean || true
            exit 1
          fi
          echo "✅ database.types.ts 与 Supabase schema 一致"

  branch-name:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: github.event_name == 'pull_request'

    steps:
      - name: 校验分支命名规范
        run: |
          BRANCH="${{ github.head_ref }}"
          if ! echo "$BRANCH" | grep -qE '^(feat|fix|docs|refactor|test|chore|build|ci|style)/'; then
            echo "::error::分支命名不规范: $BRANCH"
            echo "期望格式: <type>/<简述> (type = feat|fix|docs|refactor|test|chore|build|ci|style)"
            exit 1
          fi
          echo "✅ 分支名符合规范: $BRANCH"
